<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Logs</title>
<link rel="icon" href="https://i.imgur.com/vEMjW0C.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  font-family:Arial;
  background:#020617;
  color:white;
  margin:0;
}

header{
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #0f172a;
}

.header-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo{
  height:45px;
}

.back-btn{
  background:#6366f1;
  color:white;
  padding:8px 15px;
  border-radius:6px;
  text-decoration:none;
  transition:0.2s;
}

.back-btn:hover{
  background:#4f46e5;
}

/* LOG CARD */

.log{
  background:#020617;
  margin:12px;
  padding:14px;
  border-radius:10px;
  border:1px solid #1e293b;
  animation:fadeUp 0.4s ease;
  transition:0.2s;
}

.log:hover{
  border:1px solid #3b82f6;
}

.date{
  font-size:12px;
  opacity:0.6;
}

.action{
  font-weight:bold;
}

.restock{ color:#3b82f6; }
.retrait{ color:#f59e0b; }

.loader{
  text-align:center;
  padding:40px;
  opacity:0.6;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<header>
  <div class="header-left">
    <img src="https://i.imgur.com/vEMjW0C.png" class="logo">
    <h2>ADMIN – Logs</h2>
  </div>
  <a href="home.html" class="back-btn">← Retour</a>
</header>

<div id="logs"></div>

<script>

const SUPABASE_URL="https://gktawbaposndfxijkxdk.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk";
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

/* CHECK ADMIN */
const currentUser=JSON.parse(localStorage.getItem("genesi_user"));

if(!currentUser || currentUser.permission!=="admin"){
  alert("Accès refusé");
  location.href="home.html";
}

async function loadLogs(){

  const logsDiv=document.getElementById("logs");
  logsDiv.innerHTML='<div class="loader">Chargement...</div>';

  const {data,error}=await supabaseClient
  .from("logs_genesi")
  .select("*")
  .order("id",{ascending:false});

  if(error){
    logsDiv.innerHTML=error.message;
    return;
  }

  if(!data || data.length===0){
    logsDiv.innerHTML='<div class="log">Aucun log</div>';
    return;
  }

  logsDiv.innerHTML="";

  data.forEach(l=>{

    const date = l.created_at 
      ? new Date(l.created_at).toLocaleString()
      : "";

    logsDiv.innerHTML+=`
    <div class="log">

      <div class="date">${date}</div>

      <b>${l.username}</b> —
      <span class="action ${l.action}">
        ${l.action.toUpperCase()}
      </span> —
      ${l.medicament} —
      <b>${l.quantite}</b>

    </div>
    `;
  });

}

loadLogs();

</script>
</body>
</html>
