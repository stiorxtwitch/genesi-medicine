<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Logs</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial; background:#020617; color:white; margin:0; padding:20px; }
header { margin-bottom:20px; }
.back-btn { background:#6366f1; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; text-decoration:none; display:inline-block; margin-top:10px; }
.back-btn:hover { background:#4f46e5; }
.log { border-bottom:1px solid #334155; padding:12px; background:#1e293b; margin-bottom:5px; border-radius:4px; }
.log-action { color:#10b981; font-weight:bold; }
.log-action.restock { color:#3b82f6; }
.log-date { color:#94a3b8; font-size:0.9em; }
</style>
</head>
<body>
<header>
  <h2>ADMIN – Logs (10 derniers jours)</h2>
  <a href="home.html" class="back-btn">← Retour</a>
</header>
<div id="logs"></div>
<script>
const SUPABASE_URL = "https://gktawbaposndfxijkxdk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk";
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

// Vérifier si admin
let currentUser = JSON.parse(localStorage.getItem('genesi_user'));
if (!currentUser || currentUser.role !== 'admin') {
  alert('Accès refusé');
  window.location.href = 'home.html';
}

async function loadLogs() {
  const tenDaysAgo = new Date(Date.now() - 10*24*60*60*1000).toISOString();
  
  const { data, error } = await supabaseClient
    .from("logs_genesi")
    .select("*")
    .gte("timestamp", tenDaysAgo)
    .order("timestamp", { ascending: false });
  
  if (error) {
    logs.innerHTML = `<div class="log" style="color:#ef4444;">Erreur : ${error.message}</div>`;
    console.error(error);
    return;
  }
  
  if (!data || data.length === 0) {
    logs.innerHTML = `<div class="log">Aucun log disponible</div>`;
    return;
  }
  
  logs.innerHTML = "";
  data.forEach(l => {
    const date = new Date(l.timestamp).toLocaleString('fr-FR');
    const actionClass = l.action === 'restock' ? 'restock' : '';
    
    logs.innerHTML += `
      <div class="log">
        <span class="log-date">${date}</span><br>
        <b>${l.username}</b> – 
        <span class="log-action ${actionClass}">${l.action.toUpperCase()}</span> – 
        ${l.medicament} – 
        <b>${l.quantite} unité(s)</b>
      </div>`;
  });
}

loadLogs();
</script>
</body>
</html>
