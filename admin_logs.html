<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Logs</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
margin:0;
padding:25px;
}

h2{
margin-bottom:20px;
}

.log{
background:#020617;
border:1px solid #1e293b;
padding:15px;
margin-bottom:12px;
border-radius:12px;
animation:fade .35s ease;
transition:.2s;
}

.log:hover{
border:1px solid #3b82f6;
}

.date{
font-size:12px;
opacity:.6;
margin-bottom:6px;
}

.action{
font-weight:bold;
}

.restock{color:#3b82f6}
.retrait{color:#f59e0b}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

</style>
</head>

<body>

<h2>ADMIN – Logs activité</h2>

<div id="logs"></div>

<script>

const currentUser=JSON.parse(localStorage.getItem("genesi_user"));

if(!currentUser || currentUser.permission!=="admin"){
alert("Accès refusé");
location.href="home.html";
}

function loadLogs(){

const container=document.getElementById("logs");
const logs=JSON.parse(localStorage.getItem("genesi_logs")) || [];

if(logs.length===0){
container.innerHTML="Aucun log";
return;
}

container.innerHTML="";

logs.reverse().forEach(l=>{

const date=new Date(l.date).toLocaleString();

container.innerHTML+=`
<div class="log">

<div class="date">${date}</div>

<b>${l.username}</b><br>
<span class="action ${l.action}">
${l.action.toUpperCase()}
</span><br>

Médicament : ${l.medicament}<br>
Quantité : ${l.quantite}

</div>
`;
});

}

loadLogs();

</script>
</body>
</html>
