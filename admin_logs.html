<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Logs</title>
<link rel="icon" href="https://i.imgur.com/vEMjW0C.png">

<style>
body{
font-family:Arial;
background:#020617;
color:white;
margin:0;
padding:20px;
}

.log{
background:#020617;
border:1px solid #1e293b;
padding:12px;
margin:10px;
border-radius:8px;
animation:fade .4s;
}

.date{
opacity:.6;
font-size:12px;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}
</style>
</head>

<body>

<h2>ADMIN – Logs</h2>

<div id="logs"></div>

<script>

const currentUser=JSON.parse(localStorage.getItem("genesi_user"));

if(!currentUser || currentUser.permission!=="admin"){
alert("Accès refusé");
location.href="home.html";
}

function loadLogs(){

const container=document.getElementById("logs");
const logs=JSON.parse(localStorage.getItem("genesi_logs")) || [];

if(logs.length===0){
container.innerHTML="Aucun log";
return;
}

container.innerHTML="";

logs.reverse().forEach(l=>{

const date=new Date(l.date).toLocaleString();

container.innerHTML+=`
<div class="log">

<div class="date">${date}</div>

<b>${l.username}</b><br>
Action : ${l.action}<br>
Médicament : ${l.medicament}<br>
Quantité : ${l.quantite}

</div>
`;
});

}

loadLogs();

</script>
</body>
</html>
