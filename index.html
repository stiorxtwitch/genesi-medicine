<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Connexion</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  text-align: center;
  margin-top: 120px;
}

input, button {
  padding: 10px;
  margin: 6px;
  width: 260px;
  border-radius: 6px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

#loader {
  display: none;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>GENESI – Connexion</h2>

<input id="email" type="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mot de passe"><br>

<button onclick="login()">Se connecter</button>

<div id="loader">
  <img src="https://dhahealthcare.vn/images/loading.gif" width="80">
</div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = "COLLE_ICI_TON_URL";
const SUPABASE_KEY = "COLLE_ICI_TA_CLE_ANON";

/* ⚠️ IMPORTANT : on ne s'appelle PAS supabase */
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= LOGIN ================= */
async function login() {
  document.getElementById("loader").style.display = "block";

  const userEmail = document.getElementById("email").value.trim();
  const userPass = document.getElementById("password").value.trim();

  if (!userEmail || !userPass) {
    alert("Merci de remplir tous les champs");
    document.getElementById("loader").style.display = "none";
    return;
  }

  const { data, error } = await db
    .from("login_genesi")
    .select("email, role")
    .eq("email", userEmail)
    .eq("pass", userPass)
    .single();

  if (error || !data) {
    alert("Identifiants incorrects");
    document.getElementById("loader").style.display = "none";
    return;
  }

  /* Sauvegarde session */
  localStorage.setItem("genesi_user", JSON.stringify(data));

  /* Effet chargement */
  setTimeout(() => {
    window.location.href = "home.html";
  }, 2000);
}
</script>

</body>
</html>
