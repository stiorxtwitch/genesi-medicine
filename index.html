<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Connexion</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/vEMjW0C.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #020617 0%, #1e293b 100%);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.login-container {
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  text-align: center;
  max-width: 400px;
  width: 100%;
}
.logo {
  width: 120px;
  margin-bottom: 20px;
}
h2 {
  color: #020617;
  margin-bottom: 30px;
}
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  box-sizing: border-box;
  font-size: 16px;
}
button {
  width: 100%;
  padding: 12px;
  background: #10b981;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}
button:hover {
  background: #059669;
}
.loading {
  display: none;
  margin-top: 20px;
}
.loading img {
  width: 50px;
}
.error {
  color: #ef4444;
  margin-top: 10px;
  display: none;
}
</style>
</head>
<body>
<div class="login-container">
  <img src="https://i.imgur.com/vEMjW0C.png" alt="GENESI Logo" class="logo">
  <h2>GENESI</h2>
  <h3>Connexion</h3>
  
  <input type="text" id="username" placeholder="Nom d'utilisateur" autocomplete="username">
  <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password">
  <button onclick="login()">Se connecter</button>
  
  <div class="loading" id="loading">
    <img src="https://dhahealthcare.vn/images/loading.gif" alt="Chargement...">
    <p>Connexion en cours...</p>
  </div>
  
  <div class="error" id="error"></div>
</div>

<script>
const SUPABASE_URL = "https://gktawbaposndfxijkxdk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk";
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

async function login() {
  const usernameInput = document.getElementById('username').value.trim();
  const passwordInput = document.getElementById('password').value.trim();
  
  if (!usernameInput || !passwordInput) {
    showError('Veuillez remplir tous les champs');
    return;
  }
  
  // Afficher le loading
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error').style.display = 'none';
  
  // Simulation délai pour le loading (2 secondes)
  await new Promise(resolve => setTimeout(resolve, 2000));
  
  try {
    const { data, error } = await supabaseClient
      .from('login_genesi')
      .select('*')
      .eq('username', usernameInput)
      .eq('password', passwordInput)
      .single();
    
    if (error || !data) {
      showError('Identifiants incorrects');
      document.getElementById('loading').style.display = 'none';
      return;
    }
    
    // Stocker les infos utilisateur
    const user = {
      id: data.id,
      username: data.username,
      role: data.role
    };
    
    localStorage.setItem('genesi_user', JSON.stringify(user));
    sessionStorage.setItem('genesi_session', 'active');
    
    // Redirection vers home
    window.location.href = 'home.html';
    
  } catch (err) {
    console.error(err);
    showError('Erreur de connexion');
    document.getElementById('loading').style.display = 'none';
  }
}

function showError(message) {
  const errorDiv = document.getElementById('error');
  errorDiv.textContent = message;
  errorDiv.style.display = 'block';
}

// Permettre connexion avec Entrée
document.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    login();
  }
});
</script>
</body>
</html>
