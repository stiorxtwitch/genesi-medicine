<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Connexion</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/vEMjW0C.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #020617 0%, #1e293b 100%);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.login-container {
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  text-align: center;
  max-width: 400px;
  width: 100%;
}

.logo {
  width: 120px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  background: #10b981;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:disabled {
  background: #94a3b8;
}

.error {
  color: #ef4444;
  margin-top: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="login-container">
  <img src="https://i.imgur.com/vEMjW0C.png" class="logo">
  <h2>GENESI</h2>

  <input id="username" type="text" placeholder="Nom d'utilisateur">
  <input id="password" type="password" placeholder="Mot de passe">

  <button id="loginBtn" onclick="login()">Se connecter</button>

  <div id="error" class="error"></div>
</div>

<script>
/* =============================
   SUPABASE CONFIG
============================= */
const SUPABASE_URL = "https://gktawbaposndfxijkxdk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* =============================
   LOGIN RPC SIMPLE
============================= */
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const errorDiv = document.getElementById("error");

  errorDiv.style.display = "none";

  if (!username || !password) {
    showError("Champs manquants");
    return;
  }

  const { data, error } = await supabaseClient.rpc(
    "login_genesi_check",
    {
      p_username: username,
      p_password: password
    }
  );

  console.log("RPC RESULT:", data, error);

  if (error) {
    showError("Erreur Supabase");
    return;
  }

  if (!data || data.length === 0) {
    showError("Identifiants incorrects");
    return;
  }

  // succès
  localStorage.setItem("genesi_user", JSON.stringify(data[0]));
  sessionStorage.setItem("genesi_session", "active");

  window.location.href = "home.html";
}

function showError(msg) {
  const errorDiv = document.getElementById("error");
  errorDiv.innerText = msg;
  errorDiv.style.display = "block";
}

// Entrée clavier
document.addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});
</script>

</body>
</html>
