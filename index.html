<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Connexion</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#020617; color:white; text-align:center; margin-top:120px; }
input, button { padding:10px; margin:6px; width:260px; border-radius:6px; border:none; }
button { background:#2563eb; color:white; cursor:pointer; }
button:hover { background:#1d4ed8; }
#loader { display:none; margin-top:20px; }
</style>
</head>

<body>
<h2>GENESI – Connexion</h2>
<input id="email" type="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mot de passe"><br>
<button onclick="login()">Se connecter</button>

<div id="loader">
  <img src="https://dhahealthcare.vn/images/loading.gif" width="80">
</div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = "https://gktawbaposndfxijkxdk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= LOGIN ================= */
async function login() {
  document.getElementById("loader").style.display = "block";

  const emailInput = document.getElementById("email").value.trim();
  const passInput  = document.getElementById("password").value.trim();

  if(!emailInput || !passInput) {
    alert("Merci de remplir tous les champs");
    document.getElementById("loader").style.display = "none";
    return;
  }

  const { data, error } = await db
    .from("login_genesi")
    .select("email,role")
    .eq("email", emailInput)
    .eq("pass", passInput)
    .single();

  if(error || !data) {
    alert("Identifiants incorrects ou accès refusé");
    document.getElementById("loader").style.display = "none";
    return;
  }

  /* Stockage de la session */
  localStorage.setItem("genesi_user", JSON.stringify(data));

  /* Redirection après 2 secondes */
  setTimeout(()=> window.location.href = "home.html", 2000);
}
</script>
</body>
</html>
