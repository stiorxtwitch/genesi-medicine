<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Connexion</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/vEMjW0C.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #020617 0%, #1e293b 100%);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.login-container {
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  text-align: center;
  max-width: 400px;
  width: 100%;
}

.logo {
  width: 120px;
  margin-bottom: 20px;
}

h2 {
  color: #020617;
  margin-bottom: 10px;
}

h3 {
  margin-bottom: 30px;
  color: #334155;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  background: #10b981;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #059669;
}

button:disabled {
  background: #94a3b8;
  cursor: not-allowed;
}

.loading {
  display: none;
  margin-top: 20px;
}

.loading img {
  width: 50px;
}

.error {
  color: #ef4444;
  margin-top: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="login-container">
  <img src="https://i.imgur.com/vEMjW0C.png" class="logo" alt="GENESI">
  <h2>GENESI</h2>
  <h3>Connexion</h3>

  <input type="text" id="username" placeholder="Nom d'utilisateur" autocomplete="username">
  <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password">

  <button id="loginBtn" onclick="login()">Se connecter</button>

  <div class="loading" id="loading">
    <img src="https://dhahealthcare.vn/images/loading.gif" alt="Chargement">
    <p>Connexion en cours...</p>
  </div>

  <div class="error" id="error"></div>
</div>

<script>
/* ============================
   SUPABASE CONFIG
============================ */
const SUPABASE_URL = "https://gktawbaposndfxijkxdk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk"; // clé anon uniquement

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ============================
   LOGIN VIA RPC
============================ */
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn = document.getElementById('loginBtn');

  if (!username || !password) {
    showError("Veuillez remplir tous les champs");
    return;
  }

  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error').style.display = 'none';

  try {
    // petit délai UX
    await new Promise(r => setTimeout(r, 1500));

    const { data, error } = await supabaseClient
      .rpc('login_genesi_check', {
        p_username: username,
        p_password: password
      });

    console.log("RPC réponse :", { data, error });

    if (error) {
      showError("Erreur de connexion");
      resetUI();
      return;
    }

    if (!data || data.length === 0) {
      showError("Identifiants incorrects");
      resetUI();
      return;
    }

    // utilisateur validé
    const user = {
      id: data[0].id,
      username: data[0].username,
      permission: data[0].permission
    };

    localStorage.setItem("genesi_user", JSON.stringify(user));
    sessionStorage.setItem("genesi_session", "active");

    window.location.href = "home.html";

  } catch (err) {
    console.error(err);
    showError("Erreur inattendue");
    resetUI();
  }
}

/* ============================
   UI HELPERS
============================ */
function resetUI() {
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loading').style.display = 'none';
}

function showError(msg) {
  const e = document.getElementById('error');
  e.textContent = msg;
  e.style.display = 'block';
}

// Connexion avec Entrée
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>

</body>
</html>
