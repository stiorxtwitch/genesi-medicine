<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Restock</title>
<link rel="icon" href="https://i.imgur.com/vEMjW0C.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#020617;color:white;margin:0;padding:20px;}
h2{margin-bottom:20px;}
.card{background:#020617;border:1px solid #1e293b;padding:18px;margin-bottom:15px;border-radius:12px;transition:.25s;animation:fade .35s ease;}
.card:hover{border:1px solid #3b82f6;transform:translateY(-3px);}
input{padding:7px;border-radius:8px;border:none;background:#0f172a;color:white;width:80px;margin-right:8px;}
button{background:#3b82f6;border:none;padding:8px 15px;border-radius:8px;color:white;cursor:pointer;transition:.2s;}
button:hover{background:#2563eb;}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
.scanOverlay{position:fixed;inset:0;background:#000c;display:none;justify-content:center;align-items:center;flex-direction:column;z-index:999;}
.machine{width:260px;margin-bottom:20px;}
.cardImg{width:160px;position:absolute;pointer-events:none;transition:.05s;}
.success{color:#22c55e;font-size:22px;margin-top:20px;display:none;}
</style>
</head>
<body>
<h2>ADMIN – Restock</h2>
<div id="list"></div>

<script>
const SUPABASE_URL="https://gktawbaposndfxijkxdk.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk";
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const currentUser=JSON.parse(localStorage.getItem("genesi_user"));
if(!currentUser || currentUser.permission!=="admin"){alert("Accès refusé"); location.href="home.html";}

function addLog(action,medicament,quantite){
  let logs=JSON.parse(localStorage.getItem("genesi_logs"))||[];
  logs.push({username:currentUser.username,action,medicament,quantite,date:new Date().toISOString()});
  localStorage.setItem("genesi_logs",JSON.stringify(logs));
}

function scanCard(callback){
  const overlay=document.createElement("div");
  overlay.className="scanOverlay";
  overlay.innerHTML=`<img src="https://i.imgur.com/WHCRXGk.png" class="machine"><img src="https://i.imgur.com/CzPOlwn.png" class="cardImg"><div class="success">✔ Carte validée</div>`;
  document.body.appendChild(overlay);
  overlay.style.display="flex";
  const card=overlay.querySelector(".cardImg");
  const ok=overlay.querySelector(".success");
  document.onmousemove=e=>{
    card.style.left=e.clientX-80+"px";
    card.style.top=e.clientY-50+"px";
  };
  overlay.onclick=()=>{
    ok.style.display="block";
    setTimeout(()=>{overlay.remove(); callback();},3000);
  };
}

async function load(){
  const {data}=await supabaseClient.from("table_genesi").select("*").order("nom");
  list.innerHTML="";
  data.forEach(m=>{
    list.innerHTML=`<div class="card"><b>${m.nom}</b><br>Stock: ${m.stock}<br><br>
    <input type="number" id="s_${m.id}" value="10">
    <button onclick="restock(${m.id},${m.stock},'${m.nom}')">Ajouter</button></div>`+list.innerHTML;
  });
}

async function restock(id,stock,nom){
  const qte=parseInt(document.getElementById(`s_${id}`).value);
  scanCard(async ()=>{
    await supabaseClient.from("table_genesi").update({stock:stock+qte}).eq("id",id);
    addLog("restock",nom,qte);
    load();
  });
}

load();
</script>
</body>
</html
