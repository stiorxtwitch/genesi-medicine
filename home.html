<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Home</title>
<link rel="icon" href="https://i.imgur.com/vEMjW0C.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#020617; color:white; margin:0; }
header { background:#020617; padding:15px; display:flex; justify-content:space-between; align-items:center; }
.logo { height:40px; }
.admin-nav { background:#1e293b; padding:10px; display:none; }
.admin-nav button { margin-right:10px; padding:8px 14px; border:none; border-radius:5px; background:#3b82f6; color:white; cursor:pointer; }
.admin-nav button:hover { background:#2563eb; }
.card { background:#1e293b; margin:10px; padding:15px; border-radius:8px; }
input { width:60px; }
button { background:#10b981; border:none; color:white; padding:6px 12px; border-radius:4px; cursor:pointer; }
button:hover { background:#059669; }
.logout { background:#ef4444; }
.search { padding:10px; background:#020617; }
</style>
</head>

<body>

<header>
  <div>
    <img src="https://i.imgur.com/vEMjW0C.png" class="logo">
    <b>GENESI</b>
  </div>
  <button class="logout" onclick="logout()">Déconnexion</button>
</header>

<div class="search">
  <input id="search" placeholder="Recherche médicament" onkeyup="loadMeds()" style="width:250px;">
</div>

<div id="adminNav" class="admin-nav">
  <button onclick="location.href='admin_restock.html'">📦 Restock</button>
  <button onclick="location.href='admin_logs.html'">📋 Logs</button>
</div>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://gktawbaposndfxijkxdk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ================= SESSION =================
const currentUser = JSON.parse(localStorage.getItem('genesi_user'));
const sessionValid = sessionStorage.getItem('genesi_session');

if (!currentUser || !sessionValid) {
  alert("Accès refusé");
  location.href = "index.html";
}

// NAV ADMIN
if (currentUser.permission === "admin") {
  document.getElementById("adminNav").style.display = "block";
}

// ================= CHARGEMENT MEDS =================
async function loadMeds() {
  const q = document.getElementById("search").value || "";

  const { data, error } = await supabaseClient
    .from("table_genesi")
    .select("*")
    .ilike("nom", `%${q}%`)
    .order("nom");

  list.innerHTML = "";

  if (error) {
    list.innerHTML = error.message;
    return;
  }

  data.forEach(m => {
    if (!canAccess(m.categorie_opioide)) return;

    const max = Math.max(1, Math.floor(m.stock * 0.2));

    list.innerHTML += `
      <div class="card">
        <b>${m.nom}</b> – ${m.classe}<br>
        <b>Dose :</b> ${m.dose} | <b>Voie :</b> ${m.voie}<br>
        <b>Stock :</b> ${m.stock}<br><br>
        <input type="number" id="q_${m.id}" min="1" max="${max}" value="1">
        <button onclick="retirer(${m.id}, '${m.nom}')">Retirer</button>
      </div>
    `;
  });
}

// ================= PERMISSIONS =================
function canAccess(cat) {
  const p = currentUser.permission;
  if (p === "admin" || p === "level3") return true;
  if (p === "level2" && cat !== "fort") return true;
  if (p === "level1" && cat === "none") return true;
  return false;
}

// ================= RETRAIT =================
async function retirer(id, nom) {
  const qte = parseInt(document.getElementById(`q_${id}`).value);
  if (!qte || qte <= 0) return;

  const { data, error } = await supabaseClient
    .from("table_genesi")
    .select("stock")
    .eq("id", id)
    .single();

  if (error) return alert("Erreur stock");

  if (qte > Math.floor(data.stock * 0.2)) {
    return alert("Quantité trop élevée");
  }

  await supabaseClient
    .from("table_genesi")
    .update({ stock: data.stock - qte })
    .eq("id", id);

  // LOG CORRIGÉ
  await supabaseClient.from("logs_genesi").insert({
    username: currentUser.username,
    action: "retrait",
    medicament: nom,
    quantite: qte,
    created_at: new Date().toISOString()
  });

  loadMeds(); // RAFRAÎCHISSEMENT IMMÉDIAT
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("genesi_user");
  sessionStorage.removeItem("genesi_session");
  location.href = "index.html";
}

loadMeds();
</script>

</body>
</html>
