<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Home</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  margin: 0;
  padding: 20px;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

h1 {
  margin: 0;
}

.user-info {
  font-size: 14px;
  opacity: 0.8;
}

.admin-nav {
  margin-bottom: 20px;
}

.admin-nav button {
  margin-right: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 6px;
  background: #10b981;
  color: white;
  cursor: pointer;
}

.admin-nav button:hover {
  background: #059669;
}

.logout {
  background: #ef4444;
}

.logout:hover {
  background: #dc2626;
}

.table-container {
  background: #0f172a;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h1>GENESI</h1>
  <div class="user-info" id="userInfo"></div>
</header>

<!-- NAV ADMIN (CACHÉ PAR DÉFAUT) -->
<div id="adminNav" class="admin-nav" style="display:none;">
  <button onclick="goRestock()">📦 Admin Restock</button>
  <button onclick="goLogs()">📋 Admin Logs</button>
</div>

<div class="table-container">
  <h2>Liste des médicaments</h2>
  <p>(Les médicaments sont déjà chargés depuis la base)</p>
</div>

<br>
<button class="logout" onclick="logout()">Déconnexion</button>

<script>
// ===============================
// VÉRIFICATION SESSION
// ===============================
const user = JSON.parse(localStorage.getItem('genesi_user'));
const sessionValid = sessionStorage.getItem('genesi_session');

if (!user || !sessionValid) {
  alert('Accès refusé. Veuillez vous connecter.');
  window.location.href = 'index.html';
}

// ===============================
// AFFICHAGE UTILISATEUR
// ===============================
document.getElementById('userInfo').innerText =
  `Utilisateur : ${user.username} | Permission : ${user.permission}`;

// ===============================
// NAV ADMIN
// ===============================
if (user.permission === 'admin') {
  document.getElementById('adminNav').style.display = 'block';
}

// ===============================
// NAVIGATION ADMIN
// ===============================
function goRestock() {
  window.location.href = 'admin_restock.html';
}

function goLogs() {
  window.location.href = 'admin_logs.html';
}

// ===============================
// LOGOUT
// ===============================
function logout() {
  localStorage.removeItem('genesi_user');
  sessionStorage.removeItem('genesi_session');
  window.location.href = 'index.html';
}
</script>

</body>
</html>
