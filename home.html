<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Home</title>

<link rel="icon" href="https://i.imgur.com/vEMjW0C.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
margin:0;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
height:42px;
}

/* GRID */

#list{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:14px;
padding:15px;
text-align:center;
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
border:1px solid #3b82f6;
}

.card img{
width:90px;
height:90px;
object-fit:contain;
margin-bottom:10px;
}

button{
background:#10b981;
border:none;
padding:8px 14px;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:8px;
}

.rcp{
background:#f59e0b;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:300px;
padding:12px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

</style>
</head>

<body>

<header>
<div style="display:flex;align-items:center;gap:10px;">
<img src="https://i.imgur.com/vEMjW0C.png" class="logo">
<b>GENESI</b>
</div>
</header>

<div class="search">
<input id="search" placeholder="Recherche..." onkeyup="loadMeds()">
</div>

<div id="list"></div>

<script>

const SUPABASE_URL="https://gktawbaposndfxijkxdk.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk";

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const currentUser=JSON.parse(localStorage.getItem("genesi_user"));

if(!currentUser || !sessionStorage.getItem("genesi_session")){
location.href="index.html";
}


/* =========================
IMAGES AUTO MATCH
========================= */

function getImage(nom){

nom = nom.toLowerCase();

/* MEDICAMENTS */

if(nom.includes("epinephrine") || nom.includes("adrénaline")) return "https://i.imgur.com/1BPatJt.png";
if(nom.includes("fentanyl")) return "https://i.imgur.com/gCSPBmd.jpeg";
if(nom.includes("morphine")) return "https://i.imgur.com/Doe8vqs.png";
if(nom.includes("propofol")) return "https://i.imgur.com/ex6iI6G.png";

/* ACCES */

if(nom.includes("intra-os")) return "https://i.imgur.com/hX0th8r.png";
if(nom.includes("intra-veineux") || nom.includes("iv")) return "https://i.imgur.com/QD16s9F.png";

/* MATERIEL */

if(nom.includes("attelle") && nom.includes("bras")) return "https://i.imgur.com/JShkaBI.png";
if(nom.includes("attelle") && nom.includes("jambe")) return "https://i.imgur.com/4sNNiKE.png";
if(nom.includes("bandage")) return "https://i.imgur.com/807O9c4.png";
if(nom.includes("civière")) return "https://i.imgur.com/YBcc7se.png";
if(nom.includes("compresse")) return "https://i.imgur.com/hxH2n1S.png";
if(nom.includes("dea")) return "https://i.imgur.com/MJepVAR.png";
if(nom.includes("ecg")) return "https://i.imgur.com/HqVgcID.png";
if(nom.includes("garrot")) return "https://i.imgur.com/4LKNHAZ.png";
if(nom.includes("ifak")) return "https://i.imgur.com/DYPAG5t.png";
if(nom.includes("chirurgical")) return "https://i.imgur.com/8bbKpaA.png";
if(nom.includes("réanimation")) return "https://i.imgur.com/RhylSa1.png";
if(nom.includes("minerve")) return "https://i.imgur.com/hemZJVv.png";
if(nom.includes("pansement") && nom.includes("terrain")) return "https://i.imgur.com/GIwqC8f.png";
if(nom.includes("hémostatique")) return "https://i.imgur.com/3QbaL2X.png";
if(nom.includes("saline")) return "https://i.imgur.com/w24VDhj.png";
if(nom.includes("sang")) return "https://i.imgur.com/vMGcCXq.png";

/* fallback */

return "https://i.imgur.com/hX0th8r.png";
}


/* RCP LINKS */

function getRCP(nom){

nom = nom.toLowerCase();

if(nom.includes("epinephrine")) return "https://app.fagg-afmps.be/pharma-status/api/files/62bc79571e5c015ab3fdf6e0";
if(nom.includes("morphine")) return "https://app.fagg-afmps.be/pharma-status/api/files/62bc5fab1e5c015ab3ce1c94";
if(nom.includes("fentanyl")) return "https://app.fagg-afmps.be/pharma-status/api/files/62bc83151e5c015ab30be808";
if(nom.includes("propofol")) return "https://app.fagg-afmps.be/pharma-status/api/files/62bc677e1e5c015ab3dec755";

return null;
}


/* LOAD */

async function loadMeds(){

list.innerHTML="";

const q=document.getElementById("search").value || "";

const {data}=await supabaseClient
.from("table_genesi")
.select("*")
.ilike("nom",`%${q}%`)
.order("nom");

data.forEach(m=>{

const img = getImage(m.nom);
const rcp = getRCP(m.nom);

list.innerHTML += `
<div class="card">

<img src="${img}">

<b>${m.nom}</b><br>
Stock : ${m.stock}<br>

<input type="number" id="q_${m.id}" value="1">

<br>

<button onclick="retirer(${m.id},'${m.nom}')">Retirer</button>

${rcp ? `<button class="rcp" onclick="window.open('${rcp}')">RCP</button>` : ""}

</div>
`;

});

}

async function retirer(id,nom){

const qte=parseInt(document.getElementById(`q_${id}`).value);

const {data}=await supabaseClient
.from("table_genesi")
.select("stock")
.eq("id",id)
.single();

await supabaseClient
.from("table_genesi")
.update({stock:data.stock-qte})
.eq("id",id);

loadMeds();
}

loadMeds();

</script>
</body>
</html>
