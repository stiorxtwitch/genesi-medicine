<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GENESI – Home</title>
<link rel="icon" href="https://i.imgur.com/vEMjW0C.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#020617;color:white;margin:0;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:#020617;border-bottom:1px solid #1e293b;}
.logo{height:42px}
.logout{background:#ef4444;border:none;padding:8px 15px;border-radius:8px;cursor:pointer;transition:.2s;}
.logout:hover{background:#dc2626;}
.search{padding:20px;text-align:center;}
.search input{width:300px;padding:12px;border-radius:10px;border:none;background:#0f172a;color:white;outline:none;transition:.2s;}
.search input:focus{box-shadow:0 0 0 2px #3b82f6;}
.card{background:#020617;border:1px solid #1e293b;margin:15px;padding:18px;border-radius:14px;transition:.25s;animation:fade .35s ease;}
.card:hover{border:1px solid #3b82f6;transform:translateY(-4px);}
button{background:#10b981;border:none;padding:7px 14px;border-radius:8px;color:white;cursor:pointer;transition:.2s;}
button:hover{background:#059669;}
input[type=number]{width:70px;padding:7px;border:none;border-radius:8px;background:#0f172a;color:white;margin-right:8px;}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1}}
.scanOverlay{position:fixed;inset:0;background:#000c;display:none;justify-content:center;align-items:center;flex-direction:column;z-index:999;}
.machine{width:260px;margin-bottom:20px;}
.cardImg{width:160px;position:absolute;pointer-events:none;transition:.05s;}
.success{color:#22c55e;font-size:22px;margin-top:20px;display:none;}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="https://i.imgur.com/vEMjW0C.png" class="logo">
    <b>GENESI</b>
  </div>
  <button class="logout" onclick="logout()">Déconnexion</button>
</header>

<div class="search">
  <input id="search" placeholder="Recherche médicament..." onkeyup="loadMeds()">
</div>

<div id="list"></div>

<script>
const SUPABASE_URL="https://gktawbaposndfxijkxdk.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk";
const supabaseClient = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const currentUser = JSON.parse(localStorage.getItem("genesi_user"));
if(!currentUser || !sessionStorage.getItem("genesi_session")){alert("Accès refusé"); location.href="index.html";}

function addLog(action,medicament,quantite){
  let logs=JSON.parse(localStorage.getItem("genesi_logs"))||[];
  logs.push({username:currentUser.username,action,medicament,quantite,date:new Date().toISOString()});
  localStorage.setItem("genesi_logs",JSON.stringify(logs));
}

function canAccess(cat,nom){
  const p=currentUser.permission;
  const n=nom.toLowerCase();
  if(p==="admin"||p==="level3") return true;
  if(p==="level2"&&cat!=="fort") return true;
  if(p==="level1"){
    if(n.includes("morphine")||n.includes("fentanyl")||n.includes("propofol")||n.includes("epinephrine")||n.includes("epinéphrine")) return false;
    return true;
  }
  return false;
}

/* SCAN + PIN */
function scanCard(callback,requirePin=false){
  const overlay=document.createElement("div");
  overlay.className="scanOverlay";
  overlay.innerHTML=`<img src="https://i.imgur.com/WHCRXGk.png" class="machine"><img src="https://i.imgur.com/CzPOlwn.png" class="cardImg"><div class="success">✔ Carte validée</div>`;
  document.body.appendChild(overlay);
  overlay.style.display="flex";
  const card=overlay.querySelector(".cardImg");
  const ok=overlay.querySelector(".success");
  document.onmousemove=e=>{
    card.style.left=e.clientX-80+"px";
    card.style.top=e.clientY-50+"px";
  };
  overlay.onclick=()=>{
    ok.style.display="block";
    setTimeout(()=>{
      overlay.remove();
      if(requirePin){showPin(callback);}else{callback();}
    },3000);
  };
}
function showPin(callback){
  const pin=prompt("Code sécurité médicament");
  if(pin==="3001"){callback();}else{alert("Code incorrect");}
}

/* LOAD MEDS */
async function loadMeds(){
  const list=document.getElementById("list");
  list.innerHTML='<div class="loader">Chargement...</div>';
  const q=document.getElementById("search").value||"";
  const {data} = await supabaseClient.from("table_genesi").select("*").ilike("nom",`%${q}%`).order("nom");
  list.innerHTML="";
  data.forEach(m=>{
    if(!canAccess(m.categorie_opioide,m.nom)) return;
    const max=Math.max(1,Math.floor(m.stock*0.2));
    list.innerHTML+=`<div class="card"><b>${m.nom}</b><br>Stock: ${m.stock}<br><br>
    <input type="number" id="q_${m.id}" value="1" min="1" max="${max}">
    <button onclick="retirer(${m.id},'${m.nom}')">Retirer</button></div>`;
  });
}

/* RETRAIT */
async function retirer(id,nom){
  const qte=parseInt(document.getElementById(`q_${id}`).value);
  scanCard(async ()=>{
    const {data}=await supabaseClient.from("table_genesi").select("stock").eq("id",id).single();
    await supabaseClient.from("table_genesi").update({stock:data.stock-qte}).eq("id",id);
    addLog("retrait",nom,qte);
    loadMeds();
  }, nom.toLowerCase().includes("morphine")||nom.toLowerCase().includes("fentanyl"));
}

/* LOGOUT */
function logout(){localStorage.removeItem("genesi_user"); sessionStorage.removeItem("genesi_session"); location.href="index.html";}

loadMeds();
</script>
</body>
</html>
